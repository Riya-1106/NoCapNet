services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nocapnet
      POSTGRES_USER: nocapnet
      POSTGRES_PASSWORD: nocapnet
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nocapnet
      MINIO_ROOT_PASSWORD: nocapnet-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
